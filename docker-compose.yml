services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports: ["5678:5678"]
    env_file:
      - .env
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - GENERIC_TIMEZONE=${TZ:-Europe/Moscow}
      - TZ=${TZ:-Europe/Moscow}
      - N8N_SECURE_COOKIE=false
      - NODE_FUNCTION_ALLOW_BUILTIN=fs
    volumes:
      - n8n-data:/home/node/.n8n
      - ./workflows:/workflows
    # Bind-mount /workflows иногда тихо не прицепляется при старте Docker до готовности WSL-FS
    # (внутри контейнера остаётся пустой tmpfs). Ждём появления users.json до 60с,
    # иначе выходим — restart: unless-stopped перезапустит и mount привяжется заново.
    entrypoint: ["/bin/sh","-c"]
    command:
      - |
        i=0
        until [ -f /workflows/state/users.json ]; do
          i=$$((i+1))
          if [ $$i -gt 30 ]; then
            echo "FATAL: /workflows bind-mount empty/broken after 60s" >&2
            exit 1
          fi
          echo "waiting for /workflows/state/users.json ($$i/30)..."
          sleep 2
        done
        exec /sbin/tini -- /docker-entrypoint.sh
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s

  n8n-kicker:
    # Дёргает webhook yt-summary-hourly сразу после старта n8n,
    # чтобы после `docker compose up` новые видео забирались без ожидания cron.
    image: curlimages/curl:8.10.1
    depends_on:
      n8n:
        condition: service_healthy
    restart: "no"
    command:
      - "-fsS"
      - "--retry"
      - "10"
      - "--retry-delay"
      - "2"
      - "--retry-connrefused"
      - "--retry-all-errors"
      - "-X"
      - "POST"
      - "http://n8n:5678/webhook/yt-summary-kick"

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    # n8n обращается через docker network: http://ollama:11434
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=5m  # совместимо с явными keep_alive в запросах
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  n8n-data:
  ollama-data:
