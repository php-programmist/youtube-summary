services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile
    image: yt-summary-n8n:local
    restart: unless-stopped
    ports: ["5678:5678"]
    env_file:
      - .env
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - GENERIC_TIMEZONE=${TZ:-Europe/Moscow}
      - TZ=${TZ:-Europe/Moscow}
      - N8N_SECURE_COOKIE=false
      # required so Code nodes can require('better-sqlite3') for the SQLite state file
      - NODE_FUNCTION_ALLOW_EXTERNAL=better-sqlite3
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=5m  # совместимо с явными keep_alive в запросах
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:14b-instruct-q4_K_M}
    # $${OLLAMA_MODEL}: doubled $$ so compose does not interpolate; shell inside container resolves it
    entrypoint: ["/bin/sh", "-c", "ollama pull $${OLLAMA_MODEL}"]
    restart: "no"

volumes:
  n8n-data:
